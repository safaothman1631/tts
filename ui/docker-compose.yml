services:
  tts-engine:
    image: tts-engine:latest
    build:
      context: ../english
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped

  tts-studio:
    image: tts-studio:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - tts-engine
    environment:
      - API_UPSTREAM=tts-engine:8000
    restart: unless-stopped
