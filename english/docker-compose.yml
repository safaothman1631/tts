version: "3.9"

services:
  api:
    build: .
    image: eng-tts:latest
    container_name: eng-tts-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENG_TTS_LOG_LEVEL: INFO
      ENG_TTS_ACOUSTIC_TIER: fast
      ENG_TTS_DEVICE: cpu
    volumes:
      - ./.cache:/app/.cache
      - ./models:/app/models
      - ./output:/app/output

  prometheus:
    image: prom/prometheus:latest
    container_name: eng-tts-prom
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana-oss:latest
    container_name: eng-tts-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
